name: Release Windows Offline Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "要创建或更新的 Release Tag，例如 v4.6.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-windows-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Verify tracked Windows package exists
        run: |
          set -euo pipefail
          test -d "dist/fpas-offline"
          test -f "dist/fpas-offline/start_fpas.cmd"
          test -f "dist/fpas-offline/start_fpas_silent.vbs"
          test -f "dist/fpas-offline/runtime/python/python.exe"
          test -f "dist/fpas-offline/dashboard/dist/index.html"

      - name: Build ZIP release asset
        id: package
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag_name="${{ inputs.tag_name }}"
          else
            tag_name="${GITHUB_REF_NAME}"
          fi
          asset_name="fpas-offline-${tag_name}-win-x64.zip"
          checksum_name="${asset_name}.sha256"
          cd dist
          zip -r "../${asset_name}" "fpas-offline"
          cd ..
          sha256sum "${asset_name}" > "${checksum_name}"
          echo "asset_name=${asset_name}" >> "${GITHUB_OUTPUT}"
          echo "checksum_name=${checksum_name}" >> "${GITHUB_OUTPUT}"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag_name="${{ inputs.tag_name }}"
          else
            tag_name="${GITHUB_REF_NAME}"
          fi
          asset_name="${{ steps.package.outputs.asset_name }}"
          checksum_name="${{ steps.package.outputs.checksum_name }}"
          title="FPAS ${tag_name}"
          notes_file="$(mktemp)"
          cat > "${notes_file}" <<'EOF'
          Windows 单机离线 one-folder 交付包。

          使用方式：
          1. 下载并解压 ZIP。
          2. 双击 `start_fpas.cmd` 启动程序。
          3. 如需隐藏控制台，可改为双击 `start_fpas_silent.vbs`。
          4. 程序会自动打开默认浏览器访问 `http://127.0.0.1:8000/dashboard/`。

          本次附件包含：
          - Windows portable-runtime one-folder ZIP 包
          - 对应 SHA256 校验文件
          EOF

          if gh release view "${tag_name}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${tag_name}" "${asset_name}" "${checksum_name}" --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${tag_name}" "${asset_name}" "${checksum_name}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${title}" \
              --notes-file "${notes_file}"
          fi
