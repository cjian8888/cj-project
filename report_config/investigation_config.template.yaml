# ============================================================
# 主核查配置文件模板 - v3.0
# ============================================================
# 本文件用于定义案件的核查配置，支持渐进式配置：
# - 首次运行时可留空，系统自动识别核心人员和公司
# - 后续可补充配置以获得更精确的分析结果
# 
# 使用说明：
# 1. 复制此文件为 investigation_config.yaml
# 2. 根据案件情况填写相关字段
# 3. 运行分析时系统自动加载配置
# ============================================================

# ---------- 主核查对象 ----------
# 被核查的主要人员信息，用于时空碰撞分析等高级功能
primary_subject:
  name: ""                      # 被核查人姓名（必填，如有）
  id_number: ""                 # 身份证号（18位，可选）
  position: ""                  # 职务（可选）
  employer: ""                  # 工作单位（可选）
  entry_date: ""                # 入职时间（格式：YYYY-MM-DD，用于时空碰撞）
  promotion_date: ""            # 提拔时间（格式：YYYY-MM-DD，用于时空碰撞）
  verified_monthly_income: 0    # 已核实的月均工资（元，可选）

# ---------- 基本信息补全 ----------
# 补充流水中无法识别的银行卡关联信息
# basic_info_supplement:
#   - person_name: "张三"
#     card_number: "6222021234567890"
#     bank_name: "中国工商银行"

# ---------- 家庭成员定义 ----------
# 明确家庭关系（如流水中无法自动识别）
# family_members:
#   - name: "李四"
#     relation: "配偶"           # 本人/配偶/子女/父/母/兄弟/姐妹
#   - name: "张小明"
#     relation: "子女"

# ---------- 调查单位 ----------
# 调查对象所在单位信息
investigation_unit:
  name: ""                      # 单位全称
  keywords:                     # 单位名称关键词（用于流水匹配）
    # - "XX县政府"
    # - "XX局"

# ---------- 白名单（排除不预警） ----------
# 日常交易对手，系统不会对其触发预警
excluded_companies:
  # - "美团"
  # - "京东"
  # - "支付宝"
  # - "微信支付"
  # - "电力公司"
  # - "自来水公司"
  # - "燃气公司"
  # - "物业管理"

# ---------- 碰撞目标（必须排查） ----------
# 已知涉案或需重点排查的供应商/公司
# 系统必须与被查人流水进行碰撞检测
collision_targets:
  # - name: "XX建设工程有限公司"
  #   type: "供应商"             # 供应商/承包商/中标代理
  #   risk_level: "high"        # high/medium/low
  #   note: "涉案供应商"
  # - name: "XX贸易公司"
  #   type: "承包商"
  #   risk_level: "high"
  #   note: ""

# ---------- 敏感人员名单 ----------
# 需重点关注是否有资金往来的特定人员
sensitive_persons:
  # - name: "王五"
  #   relation: "供应商法人"     # 供应商法人/中标代理/其他
  # - name: "赵六"
  #   relation: "中标代理"

# ---------- 数据时间范围 ----------
# 如自动检测不准确，可手动指定
data_scope:
  auto_detect: true             # 是否自动检测（推荐true）
  start_date: ""                # 手动指定开始日期（格式：YYYY-MM-DD）
  end_date: ""                  # 手动指定结束日期（格式：YYYY-MM-DD）

# ---------- 报告元信息 ----------
report_meta:
  doc_number: ""                # 文号，如 "国监查 [2026] 第 000001 号"
  case_source: ""               # 案件来源，如 "群众举报"

# ============================================================
# 配置示例（取消注释以使用）
# ============================================================
# primary_subject:
#   name: "张三"
#   position: "XX局副局长"
#   employer: "XX县XX局"
#   entry_date: "2015-03-01"
#   promotion_date: "2020-08-15"
#   verified_monthly_income: 8500
# 
# collision_targets:
#   - name: "XX建设公司"
#     type: "供应商"
#     risk_level: "high"
#     note: "中标该局多个项目"
