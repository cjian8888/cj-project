    - 住房
    - 楼盘
    - 售楼
    - 房产
    - 契税

  # 疑似购车关键词
  vehicle_keywords:
    - 车款
    - 购车
    - 4s店
    - 汽车销售
    - 汽车
    - 车辆
    - 奔驰
    - 宝马
    - 奥迪
    - 特斯拉
    - 保时捷
    - 路虎

  # 资产阈值
  thresholds:
    property: 100000      # 房产阈值（10万元）
    vehicle: 50000        # 车辆阈值（5万元）
    large_amount: 50000    # 资产分析中的大额交易阈值（5万元）
    default_vehicle_value: 200000  # 车辆默认估值（20万元/辆）

# ============================================================
# 现金交易配置
# ============================================================

cash:
  # 现金交易关键词
  keywords:
    - 取现
    - 存现
    - 现金存入
    - 现金支取
    - 支取现金
    - 存入现金
    - ATM
    - 柜台存款
    - 柜台取款
    - 柜面取款
    - 柜面存款
    - 现钞

  # 大额现金阈值
  large_threshold: 50000  # 5万元（默认值）

  # 动态阈值配置
  dynamic_threshold:
    enabled: true
    income_levels:
      500000: 100000    # 年收入50万以上，大额阈值为10万
      1000000: 200000   # 年收入100万以上，大额阈值为20万
      5000000: 500000   # 年收入500万以上，大额阈值为50万

  # 分级阈值
  thresholds:
    level_1: 10000   # 1万元
    level_2: 50000   # 5万元
    level_3: 100000  # 10万元
    level_4: 500000  # 50万元

  # 现金时空伴随检测参数
  time_window_hours: 48
  amount_tolerance_ratio: 0.05  # 金额容差：±5%

# ============================================================
# 固定频率检测配置
# ============================================================

fixed_frequency:
  min_occurrences: 3
  date_tolerance: 3      # 日期容差：±3天
  amount_tolerance: 0.1   # 金额容差:±10%

# ============================================================
# 节假日与特殊时段配置
# ============================================================

holiday:
  # 【重要】节假日优先由 holiday_service.py + chinese-calendar 库离线计算
  # 并根据核查数据的时间范围自动覆盖相关年份
  auto_generate: true
  
  # 如果需要手动覆盖，可以在这里添加自定义节假日
  # 格式示例（默认为空，系统将自动生成）:
  custom_holidays: []
  # custom_holidays:
  #   - start: '2026-01-01'
  #     end: '2026-01-03'
  #     name: 元旦
  #   - start: '2026-02-17'
  #     end: '2026-02-23'
  #     name: 春节

  # 非工作时间定义
  non_working_hours:
    start: 20  # 晚8点
    end: 8     # 早8点

  # 周末检测开关
  weekend_detection_enabled: true

  # 节假日大额交易阈值
  large_amount_threshold: 50000  # 节假日期间5万以上视为大额

  # 节假日检测时间窗口
  detection_config:
    days_before: 3      # 节前3天（送礼高峰期）
    days_after: 2       # 节后2天（回礼/谢礼）
    auto_detect_range: true  # 是否根据数据自动检测时间范围

# ============================================================
# 第三方中转配置
# ============================================================

third_party_relay:
  time_window_hours: 72

# ============================================================
# 金额拆分规避检测配置
# ============================================================

split_amount:
  threshold: 50000      # 5万元门槛
  detection_count: 3      # 连续3笔以上接近此金额
  tolerance: 0.02        # 金额容差2%（如49000-50000）

# ============================================================
# 整数金额偏好检测配置
# ============================================================

round_amount:
  threshold: 10000   # 1万元以上的整数
  min_count: 5        # 至少5笔整数金额才算偏好

# 吉利数尾号检测
lucky_tail_numbers:
  - '88'
  - '66'
  - '88888'
  - '66666'
  - '168'
  - '888'
  - '666'

# ============================================================
# 房产购置匹配配置
# ============================================================

property_match:
  time_window_months: 12      # 匹配时间窗口：登记前后12个月
  cumulative_match: true      # 是否支持累计金额匹配
  cumulative_tolerance: 0.2   # 累计匹配容差：±20%
  single_match_tolerance: 0.1  # 单笔匹配容差：±10%

