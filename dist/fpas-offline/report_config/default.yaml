      - 短信费
      - 工本费
    priority: 80

# ============================================================
# Excel字段映射配置
# ============================================================

excel_fields:
  # 支持的日期字段名（优先级从高到低）
  date_columns:
    - 交易日期
    - 日期
    - 交易时间
    - 记账日期
    - 时间
    - date
    - transaction_date
    - 发生日期

  # 支持的摘要/备注字段名
  description_columns:
    - 摘要
    - 备注
    - 交易摘要
    - 说明
    - 用途
    - 附言
    - description
    - memo
    - remark
    - 交易说明

  # 支持的收入字段名
  income_columns:
    - 收入
    - 收入金额
    - 贷方
    - 贷方金额
    - 转入
    - income
    - credit
    - deposit
    - 入账金额

  # 支持的支出字段名
  expense_columns:
    - 支出
    - 支出金额
    - 借方
    - 借方金额
    - 转出
    - expense
    - debit
    - withdrawal
    - 支取金额

  # 支持的对手方字段名
  counterparty_columns:
    - 对手方
    - 交易对象
    - 对方户名
    - 对方账号
    - 收款方
    - 付款方
    - counterparty
    - opponent
    - 对手名称

  # 支持的余额字段名
  balance_columns:
    - 余额
    - 账户余额
    - 当前余额
    - balance
    - 结余

# ============================================================
# 文件路径配置
# ============================================================

output:
  excel_file: 资金核查底稿.xlsx
  report_file: 核查结果分析报告.docx
  log_file: audit_system.log
  directory: ./output

# PDF线索文件关键词（用于自动识别）
clue_file_keywords:
  - 线索
  - 举报
  - 信访
  - clue
  - tip

# ============================================================
# 日志配置
# ============================================================

logging:
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  date_format: '%Y-%m-%d %H:%M:%S'
  level: INFO

# ============================================================
# 报告模板配置
# ============================================================

report:
  title: 核查结果分析报告
  sections:
    - 一、基本情况
    - 二、个人资产分析
    - 三、公司资金流向
    - 四、发现的疑点
    - 五、下一步工作建议

  # 疑点风险等级
  risk_levels:
    high: 高风险
    medium: 中风险
    low: 低风险
    info: 信息提示

  # 报告生成阈值
  thresholds:
    car_payment_min: 10000      # 车辆支付最低金额（1万元）
    house_payment_min: 50000    # 房产支付最低金额（5万元）

# ============================================================
# 数据质量检查配置
# ============================================================

data_quality:
  # 必需字段
  required_fields:
    - date
    - description

  # 允许的日期格式
  date_formats:
    - '%Y-%m-%d'
    - '%Y/%m/%d'
    - '%Y.%m.%d'
    - '%Y年%m月%d日'
    - '%Y-%m-%d %H:%M:%S'
    - '%Y/%m/%d %H:%M:%S'
    - '%Y%m%d'

  # 数据质量阈值
  max_single_amount: 10000000  # 单笔交易异常阈值（1000万元）

# ============================================================
# 集中式阈值配置
# ============================================================

thresholds:
  # 数据验证阈值
  validation:
    max_single_amount: 10000000   # 单笔交易异常阈值（1000万元）
    property_expense_min: 10000   # 房产验证最低支出阈值（1万元）

  # 收入分析阈值
  income:
    min_amount: 1000                  # 收入分析最低金额（1000元）
    regular_min: 3000                 # 规律性非工资收入最低金额（3000元）
    mean_amount_min: 2000             # 规律收入均值下限（2000元）
    mean_amount_max: 80000            # 规律收入均值上限（8万元）
    unknown_source_min: 10000         # 来源不明收入最低金额（1万元）
    large_personal_min: 20000         # 个人大额转入最低金额（2万元）
    high_risk_min: 50000              # 高风险收入最低金额（5万元）
    very_large_min: 100000            # 非常大额收入阈值（10万元）

  # 可视化显示阈值
  display:
    amount_threshold: 10000          # 显示金额阈值（1万元，小于此值不显示）

  # 借贷分析阈值
  loan:
    min_amount: 5000                    # 借贷分析最低金额（5000元）
    high_risk_min: 10000                # 借贷高风险最低金额（1万元）
    bidirectional_high_risk: 50000      # 双向往来高风险阈值（5万元）
    interest_free_min: 50000            # 疑似无息借贷最低金额（5万元）
    large_no_repay_min: 100000          # 大额无还款最低金额（10万元）

  # 疑点检测阈值
  suspicion:
    property_high_risk: 1000000    # 房产高风险阈值（100万元）
    vehicle_high_risk: 500000      # 车辆高风险阈值（50万元）
    lucky_number_min: 1000         # 吉利数检测最低金额（1000元）

  # 资金穿透阈值
  penetration:
    min_amount: 10000            # 资金穿透最低金额（1万元）

  # 理财分析阈值
  wealth:
    significant_profit: 100000        # 理财显著盈利阈值（10万元）
    significant_redemption: 100000    # 理财显著赎回阈值（10万元）

# ============================================================
# 单位转换
# ============================================================

unit:
  wan: 10000  # 1万
