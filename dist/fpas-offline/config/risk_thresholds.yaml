# ============================================================
# 风险等级阈值配置
# ============================================================
risk_level_thresholds:
  # 收支判定阈值（工资占比或收支比）
  income_expense:
    high: 0.3      # 高风险：工资占比<30% 或 收支比>1.5
    medium: 0.5    # 中风险：工资占比<50% 或 收支比>1.2
    low: 0.7       # 低风险：工资占比>=70% 且收支比<=1.1
  
  # 风险评分阈值（综合评分）
  risk_score:
    high: 60       # 高风险：综合评分>=60
    medium: 30     # 中风险：综合评分>=30
    low: 0        # 低风险：综合评分<30
  
  # 五维度评分阈值（个人风险评估）
  five_dimension:
    high: 60       # 高风险：五维度评分>=60
    medium: 30     # 中风险：五维度评分>=30
    low: 0        # 低风险：五维度评分<30
