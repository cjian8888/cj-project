# 资金穿透审计系统 - 风险阈值配置文件
# 
# 说明：
# - 本文件集中管理所有风险检测阈值和系统参数
# - 修改此文件后无需重启系统，下次分析时自动生效
# - 所有金额单位均为：元

# ============================================================
# 收入分类配置
# ============================================================
income_classification:
  # 大额现金阈值（元）
  large_cash_threshold: 50000
  
  # 大额第三方支付阈值（元）
  large_third_party_threshold: 50000
  
  # 高频收入自动识别为工资的上限（元/月）
  high_frequency_salary_cap: 100000
  
  # 收入分析参数
  income_min_amount: 1000
  income_max_amount: 500000
  income_high_risk_min: 50000

# ============================================================
# 快进快出检测配置
# ============================================================
fast_in_out:
  # 时间窗口（小时）
  max_time_hours: 24
  
  # 触发检测的最低金额（元）
  min_amount: 10000
  
  # 进出金额匹配比例
  amount_ratio: 0.8
  
  # 余额归零阈值（元）
  balance_zero_threshold: 10.0
  
  # 是否检测当天进出
  same_day: true

# ============================================================
# 整进散出/散进整出检测配置
# ============================================================
structuring:
  # 大额交易阈值（元）
  min_large_amount: 50000
  
  # 最少拆分笔数
  min_split_count: 3
  
  # 时间窗口（天）
  time_window_days: 7
  
  # 金额匹配容差（20%）
  amount_tolerance: 0.2

# ============================================================
# 休眠激活检测配置
# ============================================================
dormant_activation:
  # 休眠期最少天数
  min_days: 180
  
  # 激活后大额交易阈值（元）
  activation_min_amount: 50000

# ============================================================
# 数据验证配置
# ============================================================
validation:
  # 单笔交易异常阈值（元）
  max_single_amount: 100000000
  
  # 房产验证最低支出阈值（元）
  property_expense_min: 10000
  
  # 房产购置匹配参数
  property_match:
    # 匹配时间窗口（月）
    time_window_months: 12
    # 是否支持累计金额匹配
    cumulative_match: true
    # 累计匹配容差（±20%）
    cumulative_tolerance: 0.2
    # 单笔匹配容差（±10%）
    single_match_tolerance: 0.1

# ============================================================
# 大额现金分级阈值
# ============================================================
large_cash:
  threshold: 50000
  levels:
    level_1: 10000    # 1万元
    level_2: 50000    # 5万元
    level_3: 100000   # 10万元
    level_4: 500000   # 50万元

# ============================================================
# 现金时空伴随检测配置
# ============================================================
cash_time_window:
  # 时间窗口（小时）
  hours: 48
  # 金额容差（±5%）
  amount_tolerance_ratio: 0.05

# ============================================================
# 固定频率检测配置
# ============================================================
fixed_frequency:
  # 最少出现次数
  min_occurrences: 3
  # 日期容差（±3天）
  date_tolerance: 3
  # 金额容差（±10%）
  amount_tolerance: 0.1

# ============================================================
# 资金沉淀分析配置
# ============================================================
fund_retention:
  # 过账通道阈值（留存率）
  pass_through_threshold: 0.1
  # 低留存率阈值
  low_retention_threshold: 0.3
  # 高留存率阈值
  high_retention_threshold: 0.9

# ============================================================
# 对手方频次分析配置
# ============================================================
counterparty_frequency:
  # 高频阈值（月均次数）
  min_frequency: 5
  # 小额阈值（元）
  max_amount: 5000
  # 统计周期（天）
  period_days: 30

# ============================================================
# 数据质量评分配置
# ============================================================
data_quality:
  # 问题扣分
  issue_penalty: 20
  # 警告扣分
  warning_penalty: 5
  # 高空值字段扣分
  high_null_penalty: 10
  # 质量等级
  quality_levels:
    excellent: 90
    good: 70
    medium: 50
    poor: 0

# ============================================================
# 报告生成配置
# ============================================================
report:
  # 使用全局时间戳
  use_global_timestamp: true
  # 时间戳格式
  timestamp_format: '%Y年%m月%d日 %H:%M:%S'
  # ISO时间戳格式
  iso_timestamp_format: '%Y-%m-%dT%H:%M:%S'

# ============================================================
# 性能优化配置
# ============================================================
performance:
  # 批处理大小（条）
  batch_size: 10000
  # 分块大小（条）
  chunk_size: 10000
  # 启用内存优化
  enable_memory_optimization: true
  # 启用批处理
  enable_batch_processing: true

# ============================================================
# 缓存配置
# ============================================================
cache:
  # 缓存版本号
  version: "3.2.0"
  # 缓存主版本号
  version_major: 3
  # 图谱最大节点数
  max_nodes: 200
  # 图谱最大边数
  max_edges: 500

# ============================================================
# 借贷分析配置
# ============================================================
loan:
  # 借贷配对最低金额（元）
  min_match_amount: 5000
  # 借贷配对时间窗口（天）
  time_window_days: 365
  # 借贷金额匹配容差（20%）
  amount_tolerance: 0.2
  # 借贷配对比例下限
  pair_ratio_min: 1.0
  # 借贷配对比例上限
  pair_ratio_max: 1.5
  # 高利贷年化利率红线（%）
  usury_rate: 36.0
  # 高息借贷年化利率阈值（%）
  high_rate: 24.0
  # 低息借贷年化利率阈值（%）
  low_rate: 4.0

# ============================================================
# 时序分析配置
# ============================================================
time_series:
  # 周期性收入高风险阈值（元）
  high_risk_amount: 50000
  # 资金突变检测最低金额（元）
  sudden_change_min_amount: 100000

# ============================================================
# 资金穿透配置
# ============================================================
fund_penetration:
  # 过账通道最低流量（元）
  min_amount: 100000
  # 资金图边最低金额（元）
  edge_min_amount: 10000

# ============================================================
# 疑点检测配置
# ============================================================
suspicion:
  # 疑点检测中等风险阈值（元）
  medium_high_amount: 50000

# ============================================================
# 行为特征分析配置
# ============================================================
behavioral:
  # 快进快出时间窗口（小时）
  fast_in_out_time_window_hours: 24
  # 是否检测当天进出
  fast_in_out_same_day: true
  # 触发检测的最低金额（元）
  fast_in_out_min_amount: 10000
  # 进出金额匹配比例
  fast_in_out_amount_ratio: 0.8
  
  # 整进散出检测参数
  structuring_min_split_count: 3
  structuring_amount_tolerance: 0.2
  structuring_time_window_days: 7
  structuring_min_large_amount: 50000
  
  # 休眠激活检测参数
  dormant_min_days: 180
  dormant_activation_min_amount: 50000

# ============================================================
# 资产分析配置
# ============================================================
asset:
  # 资产分析中的大额交易阈值（元）
  large_amount_threshold: 50000
  # 车辆默认估值（元）
  default_vehicle_value: 200000

# ============================================================
# 收入分析增强配置
# ============================================================
income_analysis:
  # 规律性非工资收入最低金额（元）
  regular_non_salary_min: 3000
  # 规律收入均值下限（元）
  mean_amount_min: 2000
  # 规律收入均值上限（元）
  mean_amount_max: 80000
  # 来源不明收入最低金额（元）
  unknown_source_min: 10000
  # 个人大额转入最低金额（元）
  large_personal_min: 20000
  # 高风险收入最低金额（元）
  high_risk_min: 50000
  # 非常大额收入阈值（元）
  very_large_min: 100000

# ============================================================
# 分期受贿检测配置
# ============================================================
bribe_installment:
  # 分期受贿最少出现次数
  min_occurrences: 4
  # 分期受贿最低金额（元/次）
  min_amount: 10000
  # 分期受贿金额最大波动系数
  max_cv: 0.5
  # 分期受贿最少跨月数
  min_months: 4

# ============================================================
# 风险评分权重配置
# ============================================================
risk_score:
  # 资金闭环分值
  fund_cycle: 15
  # 资金闭环上限
  fund_cycle_max: 30
  # 过账通道分值
  pass_through: 25
  # 资金枢纽分值
  hub_node: 10
  # 高风险交易基础分值
  high_risk_tx: 5
  # 高风险交易基础上限
  high_risk_tx_max: 20
  # 每10万金额加成分值
  amount_bonus_per_100k: 5
  # 金额加成上限
  amount_bonus_max: 20
  # 团伙分值
  community: 10
  # 团伙上限
  community_max: 20
  # 周期性收入分值（降低）
  periodic_income: 5
  # 周期性收入上限（降低）
  periodic_income_max: 10
  # 资金突变分值（降低）
  sudden_change: 3
  # 资金突变上限
  sudden_change_max: 12
  # 固定延迟转账分值
  delayed_transfer: 10
  # 固定延迟转账上限
  delayed_transfer_max: 20
  # 借贷关系分值
  loan: 8
  # 借贷关系上限
  loan_max: 16

# ============================================================
# 可视化配置
# ============================================================
visualization:
  # 图谱最大节点数
  max_nodes: 200
  # 图谱最大边数
  max_edges: 500
  # 显示金额阈值（元）
  display_amount_threshold: 10000

# ============================================================
# 调查单位配置
# ============================================================
investigation_unit:
  # 用于识别与调查单位的资金往来的关键词列表
  # 【重要】此列表应在具体案件分析时根据实际情况填写
  keywords:
    - 示例: 某某公司
    - 示例: 某某单位
    - 示例: 某某部门

# ============================================================
# 敏感人员配置
# ============================================================
sensitive_person:
  # 用于识别需要重点关注的人员姓名列表
  # 【重要】此列表应在具体案件分析时根据实际情况填写
  keywords:
    - 示例: 张三
    - 示例: 李四

# ============================================================
# 敏感公司配置
# ============================================================
sensitive_company:
  # 用于识别涉案公司或关联公司的关键词列表
  # 【重要】此列表应在具体案件分析时根据实际情况填写
  keywords:
    - 示例: 某某公司
    - 示例: 某某企业
